name: Check Lua Formating
on:
  pull_requests:
    branches:
      - 'master'
      - 'main'
      - 'feature/*'
      - 'hotfix/*'
      - 'release/*'

jobs:
  - name: Stylua Check
    uses: uses: JohnnyMorganz/stylua-action@v3
    with:
      token: ${{ secrets.GITHUB_TOKEN }}
      version: latest
      args: --check . 
